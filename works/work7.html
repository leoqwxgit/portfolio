        // 显示消息函数
        function showMessage(message, type = 'info') {
            // 移除现有的消息提示，避免重叠
            const existingMessage = document.querySelector('.message-toast');
            if (existingMessage) {
                clearTimeout(existingMessage.dataset.timeoutId);
                document.body.removeChild(existingMessage);
            }
            
            // 创建消息元素
            const messageElement = document.createElement('div');
            messageElement.className = `message-toast fixed top-20 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-lg shadow-lg z-50 transition-opacity duration-300 ${type === 'error' ? 'bg-red-500 text-white' : 'bg-blue-500 text-white'}`;
            messageElement.textContent = message;
            
            // 添加到页面
            document.body.appendChild(messageElement);
            
            // 显示消息
            setTimeout(() => {
                messageElement.style.opacity = '1';
            }, 100);
            
            // 3秒后隐藏消息
            const timeoutId = setTimeout(() => {
                messageElement.style.opacity = '0';
                setTimeout(() => {
                    if (document.body.contains(messageElement)) {
                        document.body.removeChild(messageElement);
                    }
                }, 300);
            }, 3000);
            
            // 保存超时ID，以便后续可以清除
            messageElement.dataset.timeoutId = timeoutId;
        }
        
        // 初始化函数 - 自动获取用户位置
        function initApp() {
            showMessage('正在获取您的位置...');
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    async (position) => {
                        console.log('获取位置成功:', position);
                        const { longitude, latitude } = position.coords;
                        const location = { lng: longitude.toString(), lat: latitude.toString() };
                        
                        // 将经纬度转换为地址
                        try {
                            const geocodeUrl = `https://restapi.amap.com/v3/geocode/regeo?key=${amapKey}&location=${location.lng},${location.lat}&extensions=base&output=json`;
                            const response = await fetch(geocodeUrl);
                            const data = await response.json();
                            
                            if (data.status === '1' && data.regeocode) {
                                const address = data.regeocode.formatted_address;
                                // 将地址回填到搜索地址输入框
                                const addressInput = document.getElementById('address');
                                if (addressInput) {

                                }
                            }

        // 地址解析函数 - 使用高德地图Web服务API
        function geocodeAddress(address) {
            return new Promise((resolve, reject) => {
                console.log('开始地址解析函数:', address);
                
                // 调用高德地图Web服务API进行地址解析
                const url = `https://restapi.amap.com/v3/geocode/geo?key=${amapKey}&address=${encodeURIComponent(address)}&city=&extensions=base&output=json`;
                
                console.log('地址解析URL:', url);
                
                fetch(url)
                    .then(response => response.json())
                    .then(data => {
                        console.log('地址解析结果:', data);
                        if (data.status === '1' && data.geocodes && data.geocodes.length > 0) {
                            const location = data.geocodes[0].location.split(',');
                            const coordinates = { lng: location[0], lat: location[1] };
                            console.log('地址解析成功:', coordinates);
                            resolve(coordinates);
                        } else {
                            // 地址解析失败时使用岗头地铁站的固定坐标
                            console.log('地址解析失败，使用岗头地铁站固定坐标');
                            const gangtouCoordinates = { lng: '114.147778', lat: '22.649444' };
                            resolve(gangtouCoordinates);
                        }
                    })
                    .catch(error => {
                        console.error('地址解析错误:', error);
                        // 解析错误时使用岗头地铁站的固定坐标
                        const gangtouCoordinates = { lng: '114.147778', lat: '22.649444' };
                        resolve(gangtouCoordinates);
                    });
            });
        }
        
        // 附近餐厅搜索函数 - 使用高德地图Web服务API
        function searchNearbyRestaurants(lng, lat) {
            return new Promise(async (resolve, reject) => {
                console.log('开始搜索附近餐厅函数:', { lng, lat });
                
                // 搜索多种类型的场所，包括餐厅、甜点和饮品店
                // 050100: 餐馆,对应美食tab
                // 050200: 饮品店，对应饮品tab
                // 050300: 甜点店，对应甜点tab
                const types = ['050100', '050200', '050300'];
                let allRestaurants = [];
                
                for (const type of types) {
                    try {
                        // 调用高德地图Web服务API搜索附近场所，添加extensions=all以获取评分等详细信息
                        const url = `https://restapi.amap.com/v3/place/around?key=${amapKey}&location=${lng},${lat}&radius=1000&types=${type}&extensions=all&offset=20&output=json`;
                        
                        console.log('搜索场所URL:', url);
                        
                        const response = await fetch(url);
                        const data = await response.json();
                        
                        console.log('场所搜索结果:', data);
                        
                        if (data.pois && data.pois.length > 0) {
                            console.log('poi数量:', data.pois.length);
                            // 检查是否有图片信息
                            if (data.pois[0]) {
                                console.log('POI数据结构:', Object.keys(data.pois[0]));
                                // 检查是否有图片相关字段
                                if (data.pois[0].photos) {
                                    console.log('图片信息:', data.pois[0].photos);
                                } else {
                                    console.log('没有图片信息');
                                }
                            }
                            // 转换API返回的数据格式
                            const restaurants = data.pois.map(poi => ({
                                id: poi.id,
                                name: poi.name,
                                address: poi.address || poi.location,
                                distance: poi.distance + '米',
                                rating: poi.biz_ext ? parseFloat(poi.biz_ext.rating) || 4.5 : 4.5, // 尝试从API获取评分，否则使用默认值
                                type: poi.type.split('|')[2] || '餐厅',
                                image: `https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=${encodeURIComponent(poi.name + ' shop exterior')}&image_size=landscape_4_3`
                            }));
                            
                            console.log('餐厅评分数据:', restaurants.map(r => ({ name: r.name, rating: r.rating })));
                            allRestaurants = [...allRestaurants, ...restaurants];
                        }
                    } catch (error) {
                        console.error('搜索错误:', error);
                        // 单个类型搜索失败不影响其他类型
                    }
                }
                
                // 去重处理
                const uniqueRestaurants = allRestaurants.filter((restaurant, index, self) => 
                    index === self.findIndex(r => r.id === restaurant.id)
                );
                
                // 对餐厅进行分类
                const categorizedRestaurants = categorizeRestaurants(uniqueRestaurants);
                
                console.log('获取到真实场所数据:', uniqueRestaurants.length, '家');
                console.log('分类结果:', categorizedRestaurants);
                
                if (uniqueRestaurants.length > 0) {
                    resolve(uniqueRestaurants);
                } else {
                    // 没有找到场所时返回空数组
                    console.log('未找到附近场所');
                    resolve([]);
                }
            });
        }
        
        // 餐厅分类函数
        function categorizeRestaurants(restaurants) {
            // 定义分类关键词和优先级
            const categories = {
                chinese: {
                    keywords: ['中餐', '川菜', '粤菜', '湘菜', '鲁菜', '淮扬菜', '东北菜', '西北菜', '餐馆', '饭店', '菜馆', '小吃', '快餐', '火锅', '烧烤'],
                    priority: 1
                },
                western: {
                    keywords: ['西餐', '牛排', '披萨', '意面', '汉堡', '咖啡', '酒吧'],
                    priority: 2
                },
                dessert: {
                    keywords: ['甜点', '蛋糕', '甜品', '冰淇淋', '面包', '西点', '烘焙'],
                    priority: 3
                },
                drink: {
                    keywords: ['饮品', '饮料', '奶茶', '茶', '果汁', '水吧', '饮品店', '茶艺馆'],
                    priority: 4
                }
            };
            
            // 初始化分类结果
            const result = {
                chinese: [],
                western: [],
                dessert: [],
                drink: [],
                all: restaurants
            };
            
            // 对每个餐厅进行分类
            restaurants.forEach(restaurant => {
                let assignedCategory = null;
                let highestPriority = Infinity;
                
                // 检查每个分类
                for (const [category, config] of Object.entries(categories)) {
                    // 检查餐厅名称和类型是否包含分类关键词
                    const name = restaurant.name.toLowerCase();
                    const type = restaurant.type.toLowerCase();
                    
                    const hasKeyword = config.keywords.some(keyword => 
                        name.includes(keyword.toLowerCase()) || type.includes(keyword.toLowerCase())
                    );
                    
                    // 如果找到关键词且优先级更高（数字更小）
                    if (hasKeyword && config.priority < highestPriority) {
                        assignedCategory = category;
                        highestPriority = config.priority;
                    }
                }
                
                // 如果没有找到匹配的分类，默认归类为中餐
                if (!assignedCategory) {
                    assignedCategory = 'chinese';
                }
                
                // 将餐厅添加到对应的分类
                result[assignedCategory].push(restaurant);
            });
            
            return result;
        }

        // 生成餐厅卡片
        function generateRestaurantCards(restaurants) {
            currentRestaurants = restaurants;
            const restaurantsContainer = document.getElementById('restaurants');
            const pagination = document.getElementById('pagination');
            
            // 计算总页数
            const totalPages = Math.ceil(restaurants.length / itemsPerPage);
            
            // 显示或隐藏分页控件
            if (totalPages > 1) {
                pagination.classList.remove('hidden');
                generatePagination(totalPages);
            } else {
                pagination.classList.add('hidden');
            }
            
            // 计算当前页的起始和结束索引
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const paginatedRestaurants = restaurants.slice(startIndex, endIndex);
            
            // 清空容器
            restaurantsContainer.innerHTML = '';
            
            // 生成餐厅卡片
            paginatedRestaurants.forEach(restaurant => {
                const card = document.createElement('div');
                card.className = 'restaurant-card bg-white rounded-lg overflow-hidden shadow-sm fade-in';
                card.innerHTML = `
                    <div class="relative h-48 overflow-hidden">
                        <img src="${restaurant.image}" alt="${restaurant.name}" class="w-full h-full object-cover">
                        <div class="absolute top-4 right-4 bg-accent text-white text-sm font-medium px-3 py-1 rounded-full">
                            ${restaurant.rating} ★
                        </div>
                    </div>
                    <div class="p-4">
                        <h3 class="font-semibold text-lg mb-1">${restaurant.name}</h3>
                        <p class="text-gray-600 text-sm mb-2">${restaurant.type}</p>
                        <p class="text-gray-500 text-sm mb-2">${restaurant.address}</p>
                        <p class="text-gray-500 text-sm">距离: ${restaurant.distance}</p>
                    </div>
                `;
                restaurantsContainer.appendChild(card);
            });
            
            // 触发动画
            setTimeout(() => {
                const cards = document.querySelectorAll('.restaurant-card');
                cards.forEach((card, index) => {
                    setTimeout(() => {
                        card.classList.add('active');
                    }, index * 100);
                });
            }, 100);
            
            // 滚动到餐厅列表
            document.getElementById('restaurant-list').scrollIntoView({ behavior: 'smooth' });
        }
        
        // 生成分页控件
        function generatePagination(totalPages) {
            const pageNumbersContainer = document.getElementById('page-numbers');
            const prevPageBtn = document.getElementById('prev-page');
            const nextPageBtn = document.getElementById('next-page');
            
            // 清空页码容器
            pageNumbersContainer.innerHTML = '';
            
            // 生成页码按钮
            for (let i = 1; i <= totalPages; i++) {
                const pageBtn = document.createElement('button');
                pageBtn.className = `px-4 py-2 text-sm font-medium border ${i === currentPage ? 'bg-accent text-white border-accent' : 'bg-white text-gray-500 border-gray-300 hover:bg-gray-50'}`;
                pageBtn.textContent = i;
                pageBtn.addEventListener('click', () => {
                    currentPage = i;
                    generateRestaurantCards(currentRestaurants);
                });
                pageNumbersContainer.appendChild(pageBtn);
            }
            
            // 禁用或启用上一页/下一页按钮
            prevPageBtn.disabled = currentPage === 1;
            prevPageBtn.classList.toggle('opacity-50', currentPage === 1);
            prevPageBtn.classList.toggle('cursor-not-allowed', currentPage === 1);
            
            nextPageBtn.disabled = currentPage === totalPages;
            nextPageBtn.classList.toggle('opacity-50', currentPage === totalPages);
            nextPageBtn.classList.toggle('cursor-not-allowed', currentPage === totalPages);
        }
        
        // 上一页按钮点击事件
        document.getElementById('prev-page').addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                generateRestaurantCards(currentRestaurants);
            }
        });
        
        // 下一页按钮点击事件
        document.getElementById('next-page').addEventListener('click', () => {
            const totalPages = Math.ceil(currentRestaurants.length / itemsPerPage);
            if (currentPage < totalPages) {
                currentPage++;
                generateRestaurantCards(currentRestaurants);
            }
        });

                } finally {

                    console.log('恢复按钮状态');
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                }
            });
            
            // 随机选择按钮
            const randomBtn = document.getElementById('random-btn');
            const randomResult = document.getElementById('random-result');
            const resultContent = document.getElementById('result-content');
            
            randomBtn.addEventListener('click', function() {
                if (restaurantsData.length === 0) {
                    showMessage('请先搜索餐厅', 'error');
                    return;
                }
                
                // 添加脉冲动画
                randomBtn.classList.add('pulse-animation');
                
                // 延迟显示结果
                setTimeout(() => {
                    randomBtn.classList.remove('pulse-animation');
                    
                    // 随机选择一家餐厅
                    const randomIndex = Math.floor(Math.random() * restaurantsData.length);
                    const selectedRestaurant = restaurantsData[randomIndex];
                    
                    // 显示结果
                    resultContent.innerHTML = `

                });
            });
        });
