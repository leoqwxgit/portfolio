    <style type="text/tailwindcss">
        @layer utilities {

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
            overflow: hidden;
        }
        
        canvas {
            display: block;
            margin: 0 auto;
        }
        
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding-top: 80px;
        }
        
        .game-title {
            font-size: 2.5rem;
            font-weight: 800;
            color: #ff6b6b;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 15px rgba(255, 107, 107, 0.6);
            letter-spacing: 2px;
        }
        
        .score-display {
            font-size: 1.8rem;
            color: #00d4ff;
            margin-bottom: 1rem;
            font-weight: 600;
        }
        
        .game-info {
            position: fixed;
            top: 100px;
            right: 20px;
            background: rgba(26, 38, 66, 0.8);
            padding: 1.2rem;
            border-radius: 12px;
            font-size: 1rem;
            border: 1px solid rgba(0, 212, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.1);
        }
        
        .controls-hint {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 1rem;
            background: rgba(26, 38, 66, 0.6);
            padding: 0.8rem 1.5rem;
            border-radius: 25px;
            backdrop-filter: blur(5px);
        }
        
        .start-screen, .game-over-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(26, 38, 66, 0.95), rgba(26, 42, 66, 0.95));
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        
        .start-btn, .restart-btn {
            background: linear-gradient(135deg, #ff6b6b, #ee5a52);
            border: none;
            color: white;
            padding: 1.2rem 3.5rem;
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 2rem;
            transition: all 0.3s ease;
            box-shadow: 0 0 25px rgba(255, 107, 107, 0.5);
            font-weight: 600;
        }
        
        .start-btn:hover, .restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 35px rgba(255, 107, 107, 0.7);
        }
        
        .final-score {
            font-size: 3rem;
            color: #00d4ff;
            margin: 1rem 0;
        }
        
        .high-score {
            color: #ffcc00;
            font-size: 1.2rem;
        }
    </style>
</head>
<body class="bg-white text-primary font-sans">
    <nav id="navbar" class="fixed top-0 left-0 w-full bg-white bg-opacity-95 nav-shadow py-4 z-50">
        <div class="container mx-auto px-4 md:px-8">
            <div class="flex justify-between items-center">
                <a href="../index.html" class="text-2xl font-bold text-primary">Leo Qwx</a>

                    <a href="../index.html" class="text-secondary hover:text-accent transition-colors">首页</a>

                    <a href="../index.html#vibe-coding" class="text-secondary hover:text-accent transition-colors">Vibe coding实操</a>
                    <a href="../index.html#about" class="text-secondary hover:text-accent transition-colors">关于</a>
                    <a href="../index.html#contact" class="text-secondary hover:text-accent transition-colors">联系</a>
                </div>
                
                <button id="menu-toggle" class="md:hidden ml-auto text-primary focus:outline-none">
                    <i class="fa fa-bars text-xl"></i>
                </button>
            </div>
        </div>
        
        <div id="mobile-menu" class="md:hidden bg-white hidden absolute top-full left-0 w-full border-t border-gray-100">
            <div class="container mx-auto px-4 py-4">
                <a href="../index.html" class="block py-2 text-secondary hover:text-accent">首页</a>
                <a href="../index.html#works" class="block py-2 text-secondary hover:text-accent">项目</a>
                <a href="../index.html#vibe-coding" class="block py-2 text-secondary hover:text-accent">Vibe coding实操</a>
                <a href="../index.html#about" class="block py-2 text-secondary hover:text-accent">关于</a>
                <a href="../index.html#contact" class="block py-2 text-secondary hover:text-accent">联系</a>
            </div>
        </div>
    </nav>

    <div class="start-screen" id="startScreen">
        <div class="game-title">是男人就坚持100关</div>
        <p style="color: rgba(255,255,255,0.7); max-width: 400px; text-align: center; line-height: 1.6;">
            控制你的角色躲避障碍物<br>
            坚持100秒你就是真正的男人<br>
            <span style="color: #ff4444;">准备好了吗？</span>
        </p>
        <button class="start-btn" onclick="startGame()">开始挑战</button>
    </div>

    <div class="game-over-screen" id="gameOverScreen" style="display: none;">
        <div class="game-title" id="resultTitle">游戏结束</div>
        <div class="final-score" id="finalScore">0秒</div>
        <div class="high-score" id="highScore">最高记录: 0秒</div>
        <button class="restart-btn" onclick="restartGame()">再来一次</button>
        <button class="restart-btn" style="background: linear-gradient(135deg, #666, #888); margin-top: 1rem;" onclick="goHome()">返回首页</button>
    </div>

    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div class="game-info">
        <div>存活时间: <span id="timeDisplay">0</span>秒</div>
        <div>目标: 100秒</div>
        <div style="margin-top: 0.5rem; color: #ffcc00;">最高: <span id="highScoreDisplay">0</span>秒</div>
    </div>

    <div class="controls-hint">
        按 <span style="color: #00d4ff;">空格</span> 或 <span style="color: #00d4ff;">↑</span> 跳跃 | 按住可跳更高
    </div>

    <script>
        var canvas = document.getElementById('gameCanvas');
        var ctx = canvas.getContext('2d');
        
        canvas.width = 800;
        canvas.height = 400;
        
        var gameState = {
            running: false,
            time: 0,
            lastTime: 0,
            highScore: parseInt(localStorage.getItem('manGameHighScore')) || 0
        };
        
        var player = {
            x: 100,
            y: 300,
            width: 40,
            height: 50,
            vy: 0,
            jumping: false,
            jumpHeld: false,
            jumpTime: 0
        };
        
        var groundY = 350;
        var gravity = 0.5;
        var jumpForce = -12;
        var maxJumpTime = 18;
        
        var obstacles = [];
        var obstacleTimer = 0;
        var baseSpeed = 3;
        
        document.getElementById('highScoreDisplay').textContent = gameState.highScore;
        document.getElementById('highScore').textContent = '最高记录: ' + gameState.highScore + '秒';
        
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            gameState.running = true;
            gameState.time = 0;
            gameState.lastTime = Date.now();
            player.y = groundY - player.height;
            player.vy = 0;
            player.jumping = false;
            obstacles = [];
            obstacleTimer = 0;
            gameLoop();
        }
        
        function restartGame() {
            document.getElementById('gameOverScreen').style.display = 'none';
            startGame();
        }
        
        function goHome() {
            window.location.href = '../index.html';
        }
        
        function gameOver() {
            gameState.running = false;
            var time = Math.floor(gameState.time);
            
            if (time > gameState.highScore) {
                gameState.highScore = time;
                localStorage.setItem('manGameHighScore', time);
            }
            
            document.getElementById('resultTitle').textContent = time >= 100 ? '恭喜通关！' : '游戏结束';
            document.getElementById('finalScore').textContent = time + '秒';
            document.getElementById('highScore').textContent = '最高记录: ' + gameState.highScore + '秒';
            document.getElementById('gameOverScreen').style.display = 'flex';
        }
        
        function spawnObstacle() {
            var height = 30 + Math.random() * 40;
            var width = 20 + Math.random() * 20;
            obstacles.push({
                x: canvas.width,
                y: groundY - height,
                width: width,
                height: height,
                passed: false
            });
        }
        
        function update() {
            var now = Date.now();
            var delta = (now - gameState.lastTime) / 1000;
            gameState.lastTime = now;
            gameState.time += delta;
            
            document.getElementById('timeDisplay').textContent = Math.floor(gameState.time);
            
            if (gameState.time >= 100) {
                gameOver();
                return;
            }
            
            if (player.jumping) {
                if (player.jumpHeld && player.jumpTime < maxJumpTime) {
                    player.vy += -0.8;
                    player.jumpTime++;
                }
                player.vy += gravity;
                player.y += player.vy;
                
                if (player.y >= groundY - player.height) {
                    player.y = groundY - player.height;
                    player.jumping = false;
                    player.jumpHeld = false;
                    player.jumpTime = 0;
                }
            }
            
            var speedMultiplier = 1 + gameState.time / 70;
            var currentSpeed = baseSpeed * speedMultiplier;
            
            obstacleTimer++;
            if (obstacleTimer > 80 / speedMultiplier) {
                spawnObstacle();
                obstacleTimer = 0;
            }
            
            for (var i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].x -= currentSpeed;
                
                if (obstacles[i].x + obstacles[i].width < 0) {
                    obstacles.splice(i, 1);
                    continue;
                }
                
                if (player.x < obstacles[i].x + obstacles[i].width &&
                    player.x + player.width > obstacles[i].x &&
                    player.y < obstacles[i].y + obstacles[i].height &&
                    player.y + player.height > obstacles[i].y) {
                    gameOver();
                    return;
                }
            }
        }
        
        var clouds = [];
        for (var i = 0; i < 5; i++) {
            clouds.push({
                x: Math.random() * canvas.width,
                y: Math.random() * 150 + 20,
                size: 30 + Math.random() * 40,
                speed: 0.2 + Math.random() * 0.3
            });
        }
        
        function draw() {
            var gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#4a6fa5');
            gradient.addColorStop(1, '#1a2a42');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            for (var i = 0; i < clouds.length; i++) {
                var cloud = clouds[i];
                cloud.x += cloud.speed;
                if (cloud.x > canvas.width + cloud.size) {
                    cloud.x = -cloud.size;
                }
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.beginPath();
                ctx.arc(cloud.x, cloud.y, cloud.size/2, 0, Math.PI * 2);
                ctx.arc(cloud.x + cloud.size/3, cloud.y - cloud.size/4, cloud.size/3, 0, Math.PI * 2);
                ctx.arc(cloud.x + cloud.size*2/3, cloud.y, cloud.size/2, 0, Math.PI * 2);
                ctx.fill();
            }
            
            var groundGradient = ctx.createLinearGradient(0, groundY, 0, canvas.height);
            groundGradient.addColorStop(0, '#3a5a3a');
            groundGradient.addColorStop(1, '#2a4a2a');
            ctx.fillStyle = groundGradient;
            ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
            
            var jumpOffset = player.jumping ? Math.sin(Date.now() / 100) * 5 : 0;
            ctx.fillStyle = '#ff6b6b';
            ctx.beginPath();
            ctx.arc(player.x + player.width/2, player.y + player.height/2 + jumpOffset, player.width/2, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(player.x + 12, player.y + 15 + jumpOffset, 5, 0, Math.PI * 2);
            ctx.arc(player.x + 28, player.y + 15 + jumpOffset, 5, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#00d4ff';
            for (var i = 0; i < obstacles.length; i++) {
                var obstacle = obstacles[i];
                var scale = 1 + Math.sin(Date.now() / 200 + i) * 0.1;
                ctx.save();
                ctx.translate(obstacle.x + obstacle.width/2, obstacle.y + obstacle.height/2);
                ctx.scale(scale, scale);
                ctx.translate(-(obstacle.x + obstacle.width/2), -(obstacle.y + obstacle.height/2));
                ctx.beginPath();
                ctx.moveTo(obstacle.x, obstacle.y + obstacle.height);
                ctx.lineTo(obstacle.x + obstacle.width/2, obstacle.y);
                ctx.lineTo(obstacle.x + obstacle.width, obstacle.y + obstacle.height);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }
            
            var progressGradient = ctx.createLinearGradient(0, canvas.height - 10, canvas.width, canvas.height - 10);
            progressGradient.addColorStop(0, '#4ecdc4');
            progressGradient.addColorStop(1, '#45b7d1');
            ctx.fillStyle = progressGradient;
            var progress = (gameState.time / 100) * canvas.width;
            ctx.fillRect(0, canvas.height - 10, progress, 10);
            
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = 1;
            ctx.strokeRect(0, 0, canvas.width, canvas.height);
        }
        
        function gameLoop() {
            if (!gameState.running) return;
            
            update();
            draw();
            
            requestAnimationFrame(gameLoop);
        }
        
        function jump() {
            if (!player.jumping) {
                player.jumping = true;
                player.jumpHeld = true;
                player.jumpTime = 0;
                player.vy = jumpForce;
            }
        }
        
        function releaseJump() {
            player.jumpHeld = false;
        }
        
        document.addEventListener('keydown', function(e) {
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                e.preventDefault();
                if (gameState.running) {
                    jump();
                }
            }
        });
        
        document.addEventListener('keyup', function(e) {
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                releaseJump();
            }
        });
        
        canvas.addEventListener('mousedown', function() {
            if (gameState.running) jump();
        });
        
        canvas.addEventListener('mouseup', function() {
            releaseJump();
        });
        
        canvas.addEventListener('touchstart', function(e) {
            e.preventDefault();
            if (gameState.running) jump();
        });
        
        canvas.addEventListener('touchend', function() {
            releaseJump();
        });
        
        var menuToggle = document.getElementById('menu-toggle');
        var mobileMenu = document.getElementById('mobile-menu');
        
        menuToggle.addEventListener('click', function() {
            mobileMenu.classList.toggle('hidden');
        });
    </script>
</body>
</html>
